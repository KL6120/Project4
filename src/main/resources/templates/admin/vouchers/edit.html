<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{/admin/layout::view(~{::title}, ~{::article})}"
	th:with="active=${active}">
<head>
<meta charset="UTF-8">
<title>Quản lý khuyến mãi</title>
</head>
<body>
	<article>
		<div
			class="d-flex align-items-left align-items-md-center flex-column flex-md-row pt-2 pb-4">
			<div>
				<h3 class="fw-bold mb-3">Quản lý khuyến mãi</h3>
				<h6 class="op-7 mb-2"></h6>
			</div>
			<div class="ms-md-auto py-2 py-md-0">
				<a th:href="@{/admin/vouchers}" class="btn btn-primary btn-round">Back</a>
			</div>
		</div>
		<div class="row">
			<div class="col-md-12">
				<div class="card">
					<div class="card-header">
						<h4 class="card-title">Cập nhật khuyến mãi</h4>
					</div>
					<div class="card-body">
						<label class="text-danger" th:text="${message}"></label>
						<form th:action="@{/admin/vouchers/update}" method="post"
							th:object="${voucher}">
							<div class="form-group">
								<label for="code">Code</label> <input type="text"
									class="form-control" id="code" th:field="*{code}" readonly />
								<input type="hidden" class="form-control" id="id"
									th:field="*{id}" readonly /> <input type="hidden"
									class="form-control" id="actived" th:field="*{actived}"
									readonly /> <i class="text-danger" th:errors="*{code}"></i>
							</div>
							<div class="form-group">
								<label for="discountPercent">Discount percent</label> <input
									type="number" class="form-control" id="discountPercent"
									th:field="*{discountPercent}" required /> <i
									class="text-danger" th:errors="*{discountPercent}"></i>
							</div>
							<div class="form-group">
								<label for="quantity">Quantity</label> <input type="number"
									class="form-control" id="quantity" th:field="*{quantity}"
									required /> <i class="text-danger" th:errors="*{quantity}"></i>
							</div>
							<div class="form-group">
								<label for="startedAt">Start date</label> <input type="date"
									class="form-control" id="startedAt" th:field="*{startedAt}"
									required /> <i class="text-danger" th:errors="*{startedAt}"></i>
							</div>
							<div class="form-group">
								<label for="endAt">End date</label> <input type="date"
									class="form-control" id="endAt" th:field="*{endAt}" required />
								<i class="text-danger" th:errors="*{endAt}"></i>
							</div>
							<div class="card-action">
								<button class="btn btn-success">Save</button>
								<a th:href="@{/admin/vouchers}" class="btn btn-danger">Cancel</a>
							</div>
						</form>
					</div>
				</div>
			</div>
			<script type="text/javascript">
				$('#startedAt')
						.on(
								'change',
								function() {
									const input = document
											.getElementById("startedAt");
									const startDate = new Date(document
											.getElementById("startedAt").value);
									const now = new Date();
									now.setHours(0, 0, 0, 0);
									startDate.setHours(0, 0, 0, 0);
									if (startDate < now) {
										alert("Ngày bắt đầu không được nhỏ hơn ngày hiện tại!");
										$('#startedAt').val(now);
									}
								});

				$('#endAt')
						.on(
								'change',
								function() {
									const startDate = new Date(document
											.getElementById("startedAt").value);
									const endDate = new Date(document
											.getElementById("endAt").value);

									if (startDate > endDate) {
										alert("Ngày kết thúc không được nhỏ hơn ngày bắt đầu!");
										document.getElementById("endAt").value = startDate;
									}
								});
			</script>
	</article>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{/admin/layout::view(~{::title}, ~{::article})}"
	th:with="active=${active}">
<head>
<meta charset="UTF-8">
<title>Quản lý tài khoản người dùng (user/account)</title>
</head>
<body>
	<article>
		<div
			class="d-flex align-items-left align-items-md-center flex-column flex-md-row pt-2 pb-4">
			<div>
				<h3 class="fw-bold mb-3">Quản lý tài khoản</h3>
				<h6 class="op-7 mb-2"></h6>
			</div>
			<div class="ms-md-auto py-2 py-md-0">
				<a th:href="@{/admin/users/add}"
					class="btn btn-primary btn-round">Add</a>
			</div>
		</div>
		<div class="row">
			<div class="col-md-12">
				<div class="card">
					<div class="card-header">
						<h4 class="card-title">Danh sách tài khoản</h4>
					</div>
					<div class="card-body">
						<div class="table-responsive">
							<table id="basic-datatables"
								class="display table table-striped table-hover">
								<thead>
									<tr>
										<th>Id</th>
										<th>Full name</th>
										<th>Email</th>
										<th>Gender</th>										
										<th width="15%">Action</th>
									</tr>
								</thead>

								<tbody>
									<th:block th:each="user:${users}">
										<tr th:object="${user}">
											<td th:text="*{id}"></td>											
											<td th:text="*{fullname}"></td>
											<td th:text="*{email}"></td>
											<td th:text="*{gender}"></td>
											<td>
												<div class="form-button-action">
													<a th:href="@{'/admin/manageUser/edit/' + ${user.id}}"
														data-bs-toggle="tooltip" title="Edit"
														class="btn btn-link btn-primary btn-lg"
														data-original-title="Edit Task"> <i class="fa fa-edit"></i>
													</a> <a th:href="@{'/admin/manageUser/delete/' + ${user.id}}"
														data-bs-toggle="tooltip" title="Remove"
														class="btn btn-link btn-danger"
														data-original-title="Remove"> <i class="fa fa-times"></i>
													</a>
												</div>
											</td>
										</tr>
									</th:block>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
	</article>
</body>
</html>
